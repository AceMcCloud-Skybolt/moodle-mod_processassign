name: Moodle Plugin CI

on:
  push:
  pull_request:

jobs:
  phpunit:
    name: Moodle ${{ matrix.moodle-branch }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        moodle-branch:
          - MOODLE_501_STABLE
        php:
          - '8.3'

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, pgsql, zip, gd, intl, xml, mbstring, soap, exif
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install Moodle locale
        run: |
          sudo sed -i 's/^# *en_AU.UTF-8 UTF-8/en_AU.UTF-8 UTF-8/' /etc/locale.gen
          sudo locale-gen en_AU.UTF-8
          echo "LANG=en_AU.UTF-8" >> "$GITHUB_ENV"
          echo "LC_ALL=en_AU.UTF-8" >> "$GITHUB_ENV"

      - name: Install moodle-plugin-ci
        run: |
          composer create-project --no-dev --prefer-dist --no-interaction moodlehq/moodle-plugin-ci ci ^4
          echo "$(pwd)/ci/bin" >> "$GITHUB_PATH"
          echo "$(pwd)/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Install Moodle
        run: moodle-plugin-ci install --plugin ./plugin --db-type=mariadb --db-host=127.0.0.1 --db-user=root --db-pass=root --no-init
        env:
          DB: mariadb
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: Initialise PHPUnit
        run: php moodle/public/admin/tool/phpunit/cli/init.php

      - name: PHP lint
        run: moodle-plugin-ci phplint

      - name: PHPUnit
        run: moodle-plugin-ci phpunit
